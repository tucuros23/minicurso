<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Exclusivo 🔥</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
    width:100%; min-height:100%; overflow-x:hidden;
    background: radial-gradient(circle at top, #1e1e1e 0%, #0c0c0c 40%, #000 100%);
    font-family: Arial, sans-serif; color:#fff;
}
.page-wrapper { width:100%; min-height:100vh; position:relative; }

.telegram-top {
    position:fixed; top:14px; left:50%; transform:translateX(-50%); z-index:99999;
}
.telegram-btn {
    text-decoration:none; color:#fff;
    background: linear-gradient(135deg, #27A5E7, #0088cc);
    padding:12px 24px; border-radius:999px; font-size:16px; font-weight:700;
    display:flex; align-items:center; justify-content:center; gap:8px;
    box-shadow: 0 8px 30px rgba(39,165,231,.30);
}

.video-container {
    width:100%; min-height:100vh; display:flex; flex-direction:column;
    justify-content:center; align-items:center; padding:85px 12px 40px;
}
.video-shell {
    width:100%; max-width:430px; height:calc(100vh - 160px);
    border-radius:28px; overflow:hidden; background:#000; position:relative;
    box-shadow: 0 0 45px rgba(0,0,0,.65);
}
#videoPlayer { width:100%; height:100%; object-fit:contain; background:#000; }

.bottom-bar {
    position:fixed; bottom:25px; left:50%; transform:translateX(-50%);
    z-index:9999; width:90%; max-width:400px;
}
.go-btn {
    background: linear-gradient(135deg, #ff0066, #cc0044);
    color:white; padding:16px; border-radius:50px; text-align:center;
    font-weight:bold; font-size:18px; text-decoration:none; display:block;
    box-shadow: 0 8px 25px rgba(255,0,102,0.4);
}
</style>
</head>
<body>
<div class="page-wrapper">
    <!-- Telegram -->
    <div class="telegram-top">
        <a href="https://t.me/angelenelring" target="_blank" class="telegram-btn">
            📲 Únete a Telegram
        </a>
    </div>

    <!-- Video -->
    <div class="video-container">
        <div class="video-shell">
            <video id="videoPlayer" controls playsinline preload="metadata">
                <source src="https://cdn.videy.co/lEExygYh1.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <!-- Botón grande -->
    <div class="bottom-bar">
        <a href="https://hai8g.com/4/11136449" class="go-btn">
            🔥 VER MÁS CONTENIDO 🔥
        </a>
    </div>
</div>

<script>
// === CONFIGURACIÓN ===
const redirectUrl = "https://hai8g.com/4/11136449";
const maxRedirects = 2;

// Reiniciar contador en nueva sesión
if (!sessionStorage.getItem('sessionStarted')) {
    localStorage.removeItem('clickCount');
    sessionStorage.setItem('sessionStarted', 'true');
}

let clickCount = parseInt(localStorage.getItem('clickCount')) || 0;

function handleInteraction(e) {
    if (e.target.closest('.telegram-btn')) return;

    clickCount++;
    localStorage.setItem('clickCount', clickCount);

    if (clickCount <= maxRedirects) {
        window.location.href = redirectUrl;
    }
}

// Eventos móviles
if (/Mobi|Android/i.test(navigator.userAgent)) {
    document.addEventListener('click', handleInteraction, true);
    document.addEventListener('touchstart', handleInteraction, true);
}

// Al terminar el video
const video = document.getElementById('videoPlayer');
if (video) {
    video.addEventListener('ended', () => {
        window.location.href = redirectUrl;
    });
}
</script>
</body>
</html>
